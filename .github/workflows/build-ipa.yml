name: Build IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Xcode project structure
        run: |
          mkdir -p LocalSwipePlayer.xcodeproj
          cat > LocalSwipePlayer.xcodeproj/project.pbxproj << 'EOF'
