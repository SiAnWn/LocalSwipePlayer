name: Build IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and export IPA
        run: |
          xcodebuild clean archive \
            -project LocalSwipePlayer.xcodeproj \
            -scheme LocalSwipePlayer \
            -configuration Release \
            -archivePath build/app.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportPath output \
            -exportOptionsPlist <(echo '{ "method": "development" }') \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocalSwipePlayer
          path: output/*.ipa
