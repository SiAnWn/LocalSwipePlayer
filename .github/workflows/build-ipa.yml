      - name: Build App
        run: |
          xcodebuild clean archive \
            -project LocalSwipePlayer.xcodeproj \
            -scheme LocalSwipePlayer \
            -configuration Release \
            -archivePath build/app.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          xcodebuild -exportArchive \
            -archivePath build/app.xcarchive \
            -exportPath output \
            -exportOptionsPlist <(echo '{ "method": "development" }') \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LocalSwipePlayer
          path: output/*.ipa
