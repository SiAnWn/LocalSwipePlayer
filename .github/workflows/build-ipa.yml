            children = (
                8D1F2A3D2B5F4A3C005F1A2B /* ContentView.swift */,
                8D1F2A402B5F4A5D005F1A2B /* LocalSwipePlayerApp.swift */,
            );
            path = LocalSwipePlayer;
            sourceTree = "<group>";
        };
        8D1F2A442B5F4B6E005F1A2B /* Project */ = {
            isa = PBXGroup;
            children = (
                8D1F2A3A2B5F4A2D005F1A2B /* LocalSwipePlayer */,
